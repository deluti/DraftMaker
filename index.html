<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DraftCraft — редактор чертежей локаций</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="tb-logo">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="16" height="16" rx="2" stroke="var(--accent)" stroke-width="1.5"/>
      <path d="M5 10h10M10 5v10" stroke="var(--accent2)" stroke-width="1.2" stroke-dasharray="2 2"/>
      <circle cx="10" cy="10" r="2" fill="var(--accent)"/>
    </svg>
    DRAFT<span style="color:var(--accent)">CRAFT</span>
  </div>

  <div class="sep"></div>

  <!-- Drawing tools -->
  <div class="tb-group">
    <button class="tb-btn active" data-tool="select" title="Выделить (V)">
      <svg viewBox="0 0 16 16"><path d="M3 2l10 6-5.5 1.5L6 14z" stroke-width="1.5"/></svg>
    </button>
    <button class="tb-btn" data-tool="line" title="Линия (L)">
      <svg viewBox="0 0 16 16"><line x1="3" y1="13" x2="13" y2="3"/></svg>
    </button>
    <button class="tb-btn" data-tool="rect" title="Прямоугольник (R)">
      <svg viewBox="0 0 16 16"><rect x="3" y="4" width="10" height="8" rx="1"/></svg>
    </button>
    <button class="tb-btn" data-tool="ellipse" title="Эллипс (E)">
      <svg viewBox="0 0 16 16"><ellipse cx="8" cy="8" rx="6" ry="4"/></svg>
    </button>
    <button class="tb-btn" data-tool="arc" title="Дуга по 3 точкам (A)">
      <svg viewBox="0 0 16 16"><path d="M3 13 Q8 2 13 13"/></svg>
    </button>
    <button class="tb-btn" data-tool="arrow" title="Стрелка-маршрут (W)">
      <svg viewBox="0 0 16 16"><path d="M3 13 Q8 6 11 5M9 3l2 2-2 2" stroke-width="1.8"/></svg>
    </button>
    <button class="tb-btn" data-tool="text" title="Текст (T)">
      <svg viewBox="0 0 16 16"><path d="M3 4h10M8 4v9M5 13h6" stroke-width="1.8"/></svg>
    </button>
    <button class="tb-btn" data-tool="zone" title="Зона (заливка) (Z)">
      <svg viewBox="0 0 16 16"><rect x="3" y="4" width="10" height="8" rx="1" fill="currentColor" opacity="0.3"/><rect x="3" y="4" width="10" height="8" rx="1"/></svg>
    </button>
  </div>

  <div class="sep"></div>

  <!-- Color -->
  <label class="color-well" title="Цвет">
    <input type="color" id="colorInput" value="#4f8ef7">
    <span id="colorHex">#4f8ef7</span>
  </label>

  <!-- Line style -->
  <select class="tb-select" id="lineStyleSelect" title="Стиль линии">
    <option value="solid">Сплошная</option>
    <option value="dashed">Пунктир</option>
    <option value="dotted">Точки</option>
    <option value="bold">Жирная</option>
    <option value="double">Двойная</option>
  </select>

  <!-- Arrow style (shown only when arrow tool active) -->
  <select class="tb-select" id="arrowStyleSelect" title="Стиль стрелки" style="display:none">
    <option value="arrow">→ Одинарная</option>
    <option value="arrow2">↔ Двойная</option>
    <option value="route">◈ Маршрут</option>
  </select>

  <div class="sep"></div>

  <!-- Snap toggle -->
  <label class="snap-toggle on" id="snapToggle" title="Привязка к сетке">
    <input type="checkbox" id="snapCheck" checked>
    <div class="snap-pill"></div>
    <span>Сетка</span>
  </label>

  <div class="sep"></div>

  <!-- History -->
  <div class="tb-group">
    <button class="tb-btn" id="undoBtn" title="Отменить (Ctrl+Z)">
      <svg viewBox="0 0 16 16"><path d="M3 8a5 5 0 1 1 1.5 3.5M3 4v4h4"/></svg>
    </button>
    <button class="tb-btn" id="redoBtn" title="Повторить (Ctrl+Y)">
      <svg viewBox="0 0 16 16"><path d="M13 8a5 5 0 1 0-1.5 3.5M13 4v4H9"/></svg>
    </button>
  </div>

  <!-- Zoom -->
  <div class="tb-group">
    <button class="tb-btn" id="zoomOutBtn" title="Отдалить (Ctrl+-)">
      <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4"/><line x1="10" y1="10" x2="14" y2="14"/><line x1="5" y1="7" x2="9" y2="7"/></svg>
    </button>
    <span class="zoom-display" id="zoomLabel">100%</span>
    <button class="tb-btn" id="zoomInBtn" title="Приблизить (Ctrl++)">
      <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4"/><line x1="10" y1="10" x2="14" y2="14"/><line x1="7" y1="5" x2="7" y2="9"/><line x1="5" y1="7" x2="9" y2="7"/></svg>
    </button>
    <button class="tb-btn" id="resetViewBtn" title="Сбросить вид (0)">
      <svg viewBox="0 0 16 16"><path d="M8 2v3M8 11v3M2 8h3M11 8h3"/><circle cx="8" cy="8" r="2.5"/></svg>
    </button>
  </div>

  <div class="sep"></div>

  <div class="tb-group">
    <button class="tb-btn" id="themeBtn" title="Сменить тему">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5"/><path d="M8 3a5 5 0 0 1 0 10V3z" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="tb-btn" id="gridVisBtn" title="Показать/скрыть сетку">
      <svg viewBox="0 0 16 16"><path d="M2 5.5h12M2 10.5h12M5.5 2v12M10.5 2v12" stroke-width="1.3" opacity="0.8"/></svg>
    </button>
  </div>

  <div class="spacer"></div>

  <button class="action-btn" id="saveScreenBtn">
    <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="10" rx="1"/><path d="M5 14h6M8 12v2"/></svg>
    Скриншот
  </button>
  <button class="action-btn" id="saveFileBtn">
    <svg viewBox="0 0 16 16"><path d="M3 13V5l3-3h7v11H3z"/><path d="M9 2v4h4M6 9h4M6 12h4"/></svg>
    Сохранить
  </button>
</div>

<!-- MAIN -->
<div class="main">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div class="draw-hint" id="drawHint"></div>
    <div class="minimap">
      <canvas id="minimapCanvas" width="140" height="90"></canvas>
    </div>
    <div class="hud-coords">
      <span>X: <b id="hudX">0</b></span>
      <span>Y: <b id="hudY">0</b></span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- INSPECTOR -->
    <div class="sb-section">
      <div class="sb-title">Инспектор</div>
      <div class="coord-grid">
        <div class="coord-box"><div class="lbl">X</div><div class="val" id="inspX">—</div></div>
        <div class="coord-box"><div class="lbl">Y</div><div class="val" id="inspY">—</div></div>
        <div class="coord-box"><div class="lbl">W</div><div class="val" id="inspW">—</div></div>
        <div class="coord-box"><div class="lbl">H</div><div class="val" id="inspH">—</div></div>
      </div>
    </div>

    <!-- EDIT PANEL -->
    <div class="sb-section" id="editSection" style="display:none">
      <div class="sb-title">Объект</div>
      <div class="edit-form">
        <div class="field-row">
          <label>Цвет</label>
          <input type="color" class="sb-input" id="editColor" value="#4f8ef7">
        </div>
        <div class="field-row">
          <label>Стиль линии</label>
          <select class="sb-select" id="editStyle">
            <option value="solid">Сплошная</option>
            <option value="dashed">Пунктир</option>
            <option value="dotted">Точки</option>
            <option value="bold">Жирная</option>
            <option value="double">Двойная</option>
          </select>
        </div>
        <div class="field-row" id="editArrowRow" style="display:none">
          <label>Стиль стрелки</label>
          <select class="sb-select" id="editArrowStyle">
            <option value="arrow">→ Одинарная</option>
            <option value="arrow2">↔ Двойная</option>
            <option value="route">◈ Маршрут</option>
          </select>
        </div>
        <div class="field-row" id="editTextRow" style="display:none">
          <label>Текст</label>
          <input type="text" class="sb-input" id="editText" placeholder="Текст...">
        </div>
        <div class="field-row" id="editZoneRow" style="display:none">
          <label>Непрозрачность зоны</label>
          <input type="range" id="editOpacity" min="5" max="60" value="20" style="width:100%">
        </div>
        <div class="field-row">
          <label>Метка</label>
          <input type="text" class="sb-input" id="editLabel" placeholder="Название объекта...">
        </div>
        <div class="btn-row">
          <button class="sb-btn accent" id="applyEditBtn">Применить</button>
          <button class="sb-btn danger" id="deleteBtn">Удалить</button>
        </div>
      </div>
    </div>

    <!-- ELEMENTS LIST -->
    <div class="sb-section">
      <div class="sb-title">Объекты (<span id="elCount">0</span>)</div>
      <div class="el-list" id="elList"></div>
    </div>

    <!-- QUICK COLORS -->
    <div class="sb-section">
      <div class="sb-title">Быстрые цвета</div>
      <div class="quick-colors">
        <div class="quick-color" data-c="#4f8ef7" style="background:#4f8ef7"></div>
        <div class="quick-color" data-c="#4ec994" style="background:#4ec994"></div>
        <div class="quick-color" data-c="#e05c5c" style="background:#e05c5c"></div>
        <div class="quick-color" data-c="#f0a946" style="background:#f0a946"></div>
        <div class="quick-color" data-c="#7b6af0" style="background:#7b6af0"></div>
        <div class="quick-color" data-c="#f06ba0" style="background:#f06ba0"></div>
        <div class="quick-color" data-c="#50c8d8" style="background:#50c8d8"></div>
        <div class="quick-color" data-c="#b0b0c0" style="background:#b0b0c0"></div>
        <div class="quick-color" data-c="#ffffff" style="background:#fff;border:1px solid #555"></div>
        <div class="quick-color" data-c="#1a1a2a" style="background:#1a1a2a;border:1px solid #555"></div>
      </div>
    </div>

    <!-- FILE OPS -->
    <div class="sb-section">
      <div class="sb-title">Файл</div>
      <div class="file-stack">
        <label class="file-btn" for="openFileInput">
          <svg viewBox="0 0 16 16"><path d="M2 13V5l2-2h4l2 2h4v8H2z"/><path d="M6 9h4"/></svg>
          Открыть проект
        </label>
        <input type="file" id="openFileInput" accept=".json,.draft">
        <button class="file-btn" id="clearBtn">
          <svg viewBox="0 0 16 16"><path d="M4 6h8l-1 7H5L4 6zM3 6h10M6 6V4h4v2"/></svg>
          Очистить холст
        </button>
      </div>
    </div>

  </div><!-- /sidebar -->
</div><!-- /main -->

<!-- STATUSBAR -->
<div class="statusbar">
  <div class="sb-stat"><div class="dot" id="statusDot"></div><span id="statusText">Готово</span></div>
  <div class="sb-stat">Объектов: <b id="sbCount">0</b></div>
  <div class="sb-stat">Масштаб: <b id="sbZoom">100%</b></div>
  <div class="sb-stat" id="sbSnap">Сетка: вкл</div>
  <div class="sb-stat" style="margin-left:auto">DraftCraft v3.1</div>
</div>

<script src="script.js"></script>
</body>
</html>
